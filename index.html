<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="assets/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="assets/dist/js/bootstrap.min.js"></script>
    <script src="assets/dist/js/bootstrap.bundle.min.js"></script>
    <title>Pharmacy App</title>
</head>
<body>

    <!-- Navbar-->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand px-3" href="index.html">Pharmacy</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="medicines.html">Medicines</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="medicines.html">Contact Us</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="medicines.html">Login</a>
                </li>
            </ul>
        </div>
    </nav>

    
    <!-- Carousel -->
        <div id="carouselExampleDark" class="carousel carousel-dark slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="1" aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="2" aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active" data-bs-interval="10000">
                <img src="illustration.jpg" class="d-block w-100" alt="Illustration">
            </div>
            <div class="carousel-item" data-bs-interval="2000">
                <img src="pharmacy.jpg" class="d-block w-100" alt="Pharmacy">
            </div>
            <div class="carousel-item">
                <img src="medicines.jpg" class="d-block w-100" alt="medicines">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
    
    <main role="main" class="container">

        <!-- Cards -->
        <div class="row">
            <div class="col my-5">
                <div class="card" style="width: 18rem;">
                    <img src="flaygel.webp" class="card-img-top" alt="...">
                    <div class="card-body">
                        <p class="card-text">FlayGel - $ 29.99</p>
                        <button class="btn btn-primary">Buy</button>
                        <button class="btn btn-secondary">Add to Cart</button>
                    </div>
                </div>
            </div>
            <div class="col my-5">
                <div class="card" style="width: 18rem;">
                    <img src="panadol.jpg" class="card-img-top" alt="...">
                    <div class="card-body">
                        <p class="card-text">Panadol - $ 19.99</p>
                        <button class="btn btn-primary">Buy</button>
                        <button class="btn btn-secondary">Add to Cart</button>
                    </div>
                </div>
            </div>
            <div class="col my-5">
                <div class="card" style="width: 18rem;">
                    <img src="SurbexZ.jpg" class="card-img-top" alt="...">
                    <div class="card-body">
                        <p class="card-text">SurbexZ - $ 59.99</p>
                        <button class="btn btn-primary">Buy</button>
                        <button class="btn btn-secondary">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer mt-auto py-3" style="background-color: black;">
        <div class="container">
          <span class="text-muted" style="color: white !important;">Copyrights Reserved.</span>
        </div>
      </footer>
</body>
</html>
